<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon - PNG for modern browsers, ICO for traditional browsers, ICNS for Safari macOS -->
    <link rel="icon" href="/logo/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/logo/favicon.icns" type="image/x-icns" />
    <link rel="icon" href="/logo/logo.png" type="image/png" sizes="any" />
    <link rel="shortcut icon" href="/logo/logo.png" type="image/png" />
    <!-- iOS touch icon -->
    <link rel="apple-touch-icon" href="/logo/logo.png" />
    
    <!-- Performance optimizations -->
    <!-- Preconnect to same origin for SPA API calls - the browser will use current origin -->
    
    <!-- Critical assets preloaded via Vite's modulepreload plugin during build -->

    <!-- Disable automatic image loading until JS is ready -->
    <style>
      img:not([src]) {
        visibility: hidden;
      }
      .image-placeholder {
        background-color: #f0f0f0;
        animation: pulse 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
